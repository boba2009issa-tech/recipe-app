<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header class="p-4  h-15 bg-orange-400 flex items-center justify-evenly">
    <a class="" href=""><i class="fa-solid fa-kitchen-set  text-neutral-100 text-4xl"></i></a>
    <a class="text-white font-extrabold bg-amber-400 hover:text-yellow-200 rounded-tl-3xl rounded-br-3xl p-1.5" href="">My Recipes</a>
    <a class="text-white font-extrabold bg-amber-400 hover:text-yellow-200 rounded-tl-3xl rounded-br-3xl p-1.5" href="">Add Recipes</a>
    </header>
        <section class="frist">
        <img id="image" class=" w-screen h-100 lg:h-150" src="" alt="">
        <p id="name" class="text-white mx-auto text-center  font-extrabold bg-amber-400 rounded-tl-3xl mt-6 rounded-br-3xl p-1.5 w-50 "></p>

        </section>

        <section class="ing">
            <p class="m-2 font-extrabold ">Ingredients :</p>
            <ul id="ingredients" class="list-disc ml-6 mt-6 space-y-2">

            </ul>
        </section>

        <section class="px-4  mt-6 w-full">
            <p  class="text-white mx-auto text-center  font-extrabold bg-amber-400 rounded-tl-3xl mt-6 rounded-br-3xl p-1.5 w-50 ">Method</p>

            <p id="method" class=" text-lg font-medium leading-8 whitespace-pre-line break-words"></p>
            <iframe
        id="video"
        class="w-full aspect-video rounded-xl"
        frameborder="0"
        allowfullscreen>
    </iframe>
</section>
    <script src="recipe.js"></script>
</body>
</html>
